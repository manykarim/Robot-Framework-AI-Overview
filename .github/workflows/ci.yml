name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: Initialize RFBrowser
        run: uv run rfbrowser init
      - name: Run tests
        run: uv run python -m robot tests
